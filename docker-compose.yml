# ============================================================
# AI-SERVER-COMPOSER — Docker Compose
# Services: PostgreSQL + DB Migrate + Next.js App + Nginx
# ============================================================

services:
  # --- PostgreSQL 15 ---
  db:
    image: postgres:15-alpine
    container_name: aisc-db
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-extensions.sql:ro
      - ./docker/init-grants.sql:/docker-entrypoint-initdb.d/02-grants.sql:ro
    ports:
      - "${DB_PORT:-5436}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d aisc"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 30s
    networks:
      - internal

  # --- DB 마이그레이션 + 시드 (매 배포마다 실행) ---
  db-migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: aisc-db-migrate
    restart: "no"
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
    command: >
      sh -c "npx drizzle-kit push --force && node scripts/seed-data.mjs"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - internal

  # --- Next.js App ---
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_NAME: ${NEXT_PUBLIC_APP_NAME:-AI-SERVER-COMPOSER}
        NEXT_PUBLIC_APP_DESCRIPTION: ${NEXT_PUBLIC_APP_DESCRIPTION:-RFP 기반 인프라 견적서 산출 솔루션}
    container_name: aisc-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      DATABASE_URL: "postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}"
      UPLOAD_DIR: /app/uploads
    volumes:
      - uploads:/app/uploads
    depends_on:
      db-migrate:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/api/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - internal

  # --- Nginx Reverse Proxy ---
  nginx:
    image: nginx:alpine
    container_name: aisc-nginx
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3200}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - internal

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  internal:
    driver: bridge
